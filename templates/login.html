<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart EVM — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(6,182,212,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(6,182,212,0); }
    }
    .animate-pulse-border { animation: pulse-border 2s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .bg-grid {
      background-image:
        linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="bg-gray-950 bg-grid min-h-screen flex items-center justify-center">

  <!-- Decorative glows -->
  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-96 h-72 bg-cyan-600/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="fixed bottom-0 right-1/4 w-64 h-64 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md px-6">

    <!-- Logo / Wordmark -->
    <div class="text-center mb-10 animate-float">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-500 to-indigo-600 shadow-lg shadow-cyan-500/30 mb-4">
        <!-- Fingerprint SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 11c0-1.104.896-2 2-2s2 .896 2 2v1M7 11c0-2.761 2.239-5 5-5s5 2.239 5 5v1
               M5 13c0 3.866 3.134 7 7 7s7-3.134 7-7v-2
               M9 17c0 1.657 1.343 3 3 3s3-1.343 3-3v-3
               M12 11v6" />
        </svg>
      </div>
      <h1 class="orbitron text-2xl font-extrabold text-white tracking-widest">SMART EVM</h1>
      <p class="text-cyan-400/70 text-xs mt-1 tracking-widest uppercase">Biometric Command Center</p>
    </div>

    <!-- Card -->
    <div class="relative bg-gray-900/80 backdrop-blur-xl border border-gray-700/60 rounded-2xl p-8 shadow-2xl animate-pulse-border">
      <!-- Top accent line -->
      <div class="absolute top-0 left-6 right-6 h-px bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>

      <h2 class="text-white font-semibold text-lg mb-6">Administrator Sign In</h2>

      {% if error %}
      <div class="flex items-center gap-3 bg-red-900/30 border border-red-500/40 text-red-300 text-sm rounded-lg px-4 py-3 mb-5">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10A8 8 0 11 2 10a8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zm-1 9a1 1 0 01-1-1V9a1 1 0 112 0v5a1 1 0 01-1 1z" clip-rule="evenodd" />
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-2">Username</label>
          <input
            type="text" name="username" id="username" autocomplete="username" required
            class="w-full bg-gray-800/70 border border-gray-600/60 text-white placeholder-gray-500
                   rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1
                   focus:ring-cyan-500 transition-all duration-200"
            placeholder="Enter your username"
          />
        </div>
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-2">Password</label>
          <input
            type="password" name="password" id="password" autocomplete="current-password" required
            class="w-full bg-gray-800/70 border border-gray-600/60 text-white placeholder-gray-500
                   rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1
                   focus:ring-cyan-500 transition-all duration-200"
            placeholder="••••••••"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500
                 text-white font-semibold py-3 rounded-lg transition-all duration-200
                 shadow-lg shadow-cyan-600/20 hover:shadow-cyan-500/40 hover:scale-[1.02] active:scale-95"
        >
          Sign In
        </button>
      </form>

      <!-- Bottom accent line -->
      <div class="absolute bottom-0 left-6 right-6 h-px bg-gradient-to-r from-transparent via-indigo-500 to-transparent"></div>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6">
      Secure • Biometric • Anonymous Balloting
    </p>
  </div>
</body>
</html>
